# ==========================================
# 1. \uC560\uD50C\uB9AC\uCF00\uC774\uC158 \uAE30\uBCF8 \uC124\uC815
# ==========================================
spring.application.name=commerce-service
server.servlet.session.tracking-modes=cookie
server.servlet.session.timeout=1800


# ==========================================
# 2. \uD14C\uC2A4\uD2B8 \uC804\uC6A9 MySQL \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uC5F0\uACB0 \uC124\uC815 (commerce_test)
# ==========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/commerce_test?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12041204


# ==========================================
# 3. \uD14C\uC2A4\uD2B8\uC6A9 JPA / Hibernate \uC124\uC815
# ==========================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# \uD14C\uC2A4\uD2B8 \uC2DC\uC791 \uC2DC \uD14C\uC774\uBE14\uC744 \uC0C8\uB85C \uB9CC\uB4E4\uACE0, \uD14C\uC2A4\uD2B8\uAC00 \uB05D\uB098\uBA74 \uD14C\uC774\uBE14\uC744 \uC644\uC804\uD788 \uC0AD\uC81C\uD558\uC5EC DB\uB97C \uAE68\uB057\uD558\uAC8C \uC720\uC9C0
spring.jpa.hibernate.ddl-auto=create-drop
# \uB300\uB7C9 \uB370\uC774\uD130 \uC870\uD68C \uC2DC N+1 \uBB38\uC81C\uB97C \uBC29\uC9C0\uD558\uAE30 \uC704\uD55C IN \uC808 \uBC30\uCE58 \uC0AC\uC774\uC988 \uC138\uD305
spring.jpa.properties.hibernate.default_batch_fetch_size=100


# ==========================================
# 4. \uB2E4\uAD6D\uC5B4 \uBC0F \uC778\uCF54\uB529 \uC124\uC815
# ==========================================
spring.messages.encoding=UTF-8