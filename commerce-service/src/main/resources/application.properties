# \uC560\uD50C\uB9AC\uCF00\uC774\uC158\uC758 \uACE0\uC720 \uC774\uB984 \uC815\uC758 (MSA\uB098 \uBAA8\uB2C8\uD130\uB9C1 \uC2DC \uC2DD\uBCC4\uC790\uB85C \uC0AC\uC6A9)
spring.application.name=commerce-service

# \uC138\uC158 \uCD94\uC801 \uBC29\uC2DD\uC744 \uCFE0\uD0A4(Cookie) \uAE30\uBC18\uC73C\uB85C \uACE0\uC815 (URL\uC5D0 jsessionid \uB178\uCD9C \uBC29\uC9C0)
server.servlet.session.tracking-modes=cookie

# \uC138\uC158 \uC720\uC9C0 \uC2DC\uAC04 \uC124\uC815 (\uCD08 \uB2E8\uC704, 1800\uCD08 = 30\uBD84 \uB3D9\uC548 \uC720\uC9C0)
server.servlet.session.timeout=1800



# \uB370\uC774\uD130\uBCA0\uC774\uC2A4\uC640 \uD1B5\uC2E0\uD560 \uAD6C\uCCB4\uC801\uC778 JDBC \uB4DC\uB77C\uC774\uBC84 \uD074\uB798\uC2A4 \uC9C0\uC815
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# \uB85C\uCEEC(localhost)\uC758 3306 \uD3EC\uD2B8\uC5D0\uC11C \uAD6C\uB3D9 \uC911\uC778 commerce \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uC5F0\uACB0 \uC8FC\uC18C (\uD0C0\uC784\uC874 \uC138\uD305 \uD3EC\uD568)
spring.datasource.url=jdbc:mysql://localhost:3306/commerce?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true

# \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uC811\uC18D \uC0AC\uC6A9\uC790 \uACC4\uC815\uBA85
spring.datasource.username=root

# \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uC811\uC18D \uBE44\uBC00\uBC88\uD638
spring.datasource.password=12041204



# Hibernate\uAC00 \uC0DD\uC131\uD558\uACE0 \uC2E4\uD589\uD558\uB294 \uBAA8\uB4E0 SQL \uCFFC\uB9AC\uB97C \uCF58\uC194\uCC3D\uC5D0 \uCD9C\uB825
spring.jpa.show-sql=true

# \uCF58\uC194\uC5D0 \uCD9C\uB825\uB418\uB294 SQL \uCFFC\uB9AC\uB97C \uD55C\uB208\uC5D0 \uBCF4\uAE30 \uC27D\uAC8C \uC904\uBC14\uAFC8 \uBC0F \uD3EC\uB9F7\uD305(Format) \uCC98\uB9AC
spring.jpa.properties.hibernate.format_sql=true

# \uC560\uD50C\uB9AC\uCF00\uC774\uC158 \uAD6C\uB3D9 \uC2DC \uC5D4\uD2F0\uD2F0 \uAD6C\uC870\uB97C \uBC14\uD0D5\uC73C\uB85C DB \uD14C\uC774\uBE14\uC744 \uC5B4\uB5BB\uAC8C \uBCC0\uACBD\uD560\uC9C0 \uACB0\uC815 (update: \uBCC0\uACBD\uBD84\uB9CC \uBC18\uC601)
spring.jpa.hibernate.ddl-auto=update

# \uB300\uB7C9 \uB370\uC774\uD130 \uC870\uD68C \uC2DC N+1 \uBB38\uC81C\uB97C \uBC29\uC9C0\uD558\uAE30 \uC704\uD574 \uC9C0\uC5F0 \uB85C\uB529 \uAC1D\uCCB4\uB4E4\uC744 100\uAC1C\uC529 \uBB36\uC5B4\uC11C IN \uC808\uB85C \uC870\uD68C
spring.jpa.properties.hibernate.default_batch_fetch_size=100



# \uC2DC\uC2A4\uD15C \uBA54\uC2DC\uC9C0 \uBC0F \uC778\uCF54\uB529 \uAE30\uBCF8\uAC12\uC744 UTF-8 \uADDC\uACA9\uC73C\uB85C \uC9C0\uC815
spring.messages.encoding=UTF-8

file.dir=C:/upload/
