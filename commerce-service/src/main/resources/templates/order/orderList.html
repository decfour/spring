<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>THGTTG - ORDERS</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .main-container {
            max-width: 850px;
            margin: 60px auto;
            padding: 0 20px;
        }

        /* 주문 목록 테이블 실무형 컴포넌트화 */
        .order-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .order-table th {
            padding: 14px 0;
            font-weight: 500;
            color: #86868b;
            font-size: 0.85rem;
            border-bottom: 1px solid #d2d2d7;
        }
        .order-table td {
            padding: 16px 0;
            border-bottom: 1px solid #e5e5e7;
            font-size: 0.95rem;
        }

        /* 테이블 내부 우측 정렬 전용 헬퍼 클래스 */
        .text-end-align {
            text-align: right;
        }

        /* 취소 요청 텍스트 링크 버튼 스타일화 */
        .btn-action-danger {
            background: none;
            border: none;
            padding: 0;
            color: #de363a;
            font-size: 0.9rem;
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-action-danger:hover {
            opacity: 0.7;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="main-container">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <h2 class="fw-bold m-0" style="font-size: 2rem; letter-spacing: -0.8px;">Order <span class="text-muted" style="font-weight:400;">History</span></h2>
        <a href="/shop" class="text-decoration-none" style="color: #0066cc; font-size: 0.95rem;">쇼핑 계속하기 →</a>
    </div>

    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5" style="border-top: 1px solid #d2d2d7;">
        <p class="text-muted">주문 내역 없음</p>
    </div>

    <div th:if="${not #lists.isEmpty(orders)}" class="table-responsive">
        <table class="order-table">
            <thead>
            <tr>
                <th style="width: 10%; text-align: center;">주문 번호</th>
                <th style="width: 12%; text-align: center;">회원명</th>
                <th style="width: 33%; text-align: center;">상품명</th>
                <th style="width: 15%; text-align: center;">결제 금액</th>
                <th style="width: 15%; text-align: center;">주문 일시</th>
                <th style="width: 10%; text-align: center;">상태</th>
                <th style="width: 5%; text-align: center;">작업</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}" style="width: 10%; color: #86868b; text-align: center;">1</td>

                <td th:text="${order.member.username}" style="width: 12%; text-align: center;">홍길동</td>

                <td style="width: 33%; text-align: center;">
                    <span th:text="${order.orderItems[0].item.name}" class="fw-medium">상품명</span>
                    <span th:if="${order.orderItems.size() > 1}" th:text="' 외 ' + ${order.orderItems.size() - 1} + '건'" style="color: #86868b; font-size: 0.85rem;"> 외 1건</span>
                </td>

                <td th:text="${#numbers.formatInteger(order.getTotalPrice(), 0, 'COMMA')} + '원'" class="fw-medium" style="width: 15%; text-align: center;">10,000원</td>

                <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}" style="width: 15%; color: #86868b; font-size: 0.85rem; text-align: center;">2026-05-24</td>

                <td style="width: 10%; text-align: center;">
                    <span th:text="${order.status.name() == 'ORDER'} ? '완료' : '취소'" th:style="${order.status.name() == 'ORDER'} ? 'color:#1d1d1f;' : 'color:#de363a;'">ORDER</span>
                </td>

                <td style="width: 5%; text-align: center;">
                    <form th:if="${order.status.name() == 'ORDER'}" th:action="@{/order/{id}/cancel (id=${order.id})}" method="post" class="m-0">
                        <button type="submit" class="btn-action-danger">취소</button>
                    </form>
                    <span th:if="${order.status.name() == 'CANCEL'}" style="color: #86868b;">-</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
