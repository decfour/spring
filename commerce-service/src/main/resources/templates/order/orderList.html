<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>주문 내역</title>
</head>
<body>

<h1>주문 내역</h1>

<hr>

<div th:if="${#lists.isEmpty(orders)}">
    <p>아직 주문한 내역이 없습니다</p>
    <a href="/shop">상품 보러가기</a>
</div>

<div th:if="${not #lists.isEmpty(orders)}">
    <table border="1"> <thead>
    <tr>
        <th>주문 번호</th>
        <th>회원명</th>
        <th>대표 상품명</th>
        <th>총 결제 금액</th>
        <th>주문 일시</th>
        <th>상태</th>
        <th>작업</th>
    </tr>
    </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}">1</td>
            <td th:text="${order.member.username}">홍길동</td>
            <td>
                <span th:text="${order.orderItems[0].item.name}">상품명</span>
                <span th:if="${order.orderItems.size() > 1}"
                      th:text="' 외 ' + ${order.orderItems.size() - 1} + '건'"> 외 1건</span>
            </td>
            <td th:text="${order.getTotalPrice()} + '원'">10000원</td>
            <td th:text="${order.orderDate}">2026-05-24</td>
            <td>
                <span th:text="${order.status}">ORDER</span>
            </td>
            <td>
                <form th:if="${order.status.name() == 'ORDER'}"
                      th:action="@{/order/{id}/cancel (id=${order.id})}" method="post">
                    <button type="submit">주문 취소</button>
                </form>
                <span th:if="${order.status.name() == 'CANCEL'}">-</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<br>
<a href="/shop">메인으로 이동</a>

</body>
</html>
