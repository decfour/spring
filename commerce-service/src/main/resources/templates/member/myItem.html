<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>THGTTG - My Items</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .main-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.8px;
        }

        .product-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .product-table th {
            padding: 14px 0;
            font-weight: 500;
            color: #86868b;
            font-size: 0.85rem;
            border-bottom: 1px solid #d2d2d7;
        }
        .product-table td {
            padding: 18px 0;
            border-bottom: 1px solid #e5e5e7;
            font-size: 0.95rem;
        }

        .btn-custom {
            border-radius: 6px;
            font-size: 0.85rem;
            padding: 10px 20px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .btn-secondary-outline {
            background: none;
            border: 1px solid #d2d2d7;
            color: #1d1d1f;
        }
        .btn-secondary-outline:hover {
            background-color: #f5f5f7;
            border-color: #86868b;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="main-container">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <h2 class="section-title m-0">My <span class="text-muted" style="font-weight:400;">products</span></h2>
        <button class="btn-custom btn-secondary-outline" th:onclick="|location.href='@{/member/my-page}'|" type="button">마이페이지 홈</button>
    </div>

    <table class="product-table">
        <thead>
        <tr>
            <th style="width: 10%; text-align: center;">ID</th>
            <th style="width: 40%; text-align: center;">Product</th>
            <th style="width: 15%; text-align: center;">Price</th>
            <th style="width: 15%; text-align: center;">Stock</th>
            <th style="width: 20%; text-align: center;">Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${myItems}">
            <td th:text="${item.id}" style="width: 10%; color: #86868b; text-align: center;">1</td>
            <td style="width: 40%; text-align: center;">
                <a th:href="@{/shop/item/{itemId}(itemId=${item.id})}" th:text="${item.name}" class="text-dark fw-medium text-decoration-none" style="letter-spacing: -0.2px;">내 등록 상품</a>
            </td>
            <td th:text="${#numbers.formatInteger(item.price, 0, 'COMMA')} + '원'" style="width: 15%; color: #424245; text-align: center;">10,000원</td>
            <td style="width: 15%; text-align: center;">
                <span th:if="${item.stock > 0}" th:text="${item.stock} + '개'" style="color: #1d1d1f;">5개</span>
                <span th:unless="${item.stock > 0}" style="color: #de363a; font-weight: 500;">품절</span>
            </td>
            <td style="width: 20%; text-align: center;">
                <span th:if="${item.open}" class="badge bg-light text-dark border" style="font-weight: 500; font-size: 0.8rem; padding: 5px 10px;">판매 중</span>
                <span th:unless="${item.open}" class="badge bg-secondary" style="font-weight: 500; font-size: 0.8rem; padding: 5px 10px;">판매 중지</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
