<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>THGTTS - My Page</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .main-container {
            max-width: 540px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.8px;
        }

        .profile-card {
            border: 1px solid #d2d2d7;
            border-radius: 6px;
            padding: 24px;
            background-color: #ffffff;
            margin-bottom: 30px;
        }
        .profile-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e5e5e7;
            font-size: 0.95rem;
        }
        .profile-row:last-child {
            border-bottom: none;
        }
        .profile-label {
            color: #86868b;
            font-weight: 500;
        }
        .profile-value {
            color: #1d1d1f;
            font-weight: 500;
        }

        .btn-custom {
            border-radius: 6px;
            font-size: 0.85rem;
            padding: 10px 20px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .btn-primary-dark {
            background-color: #1d1d1f;
            color: #ffffff;
            border: none;
        }
        .btn-primary-dark:hover {
            background-color: #323236;
        }
        .btn-secondary-outline {
            background: none;
            border: 1px solid #d2d2d7;
            color: #1d1d1f;
            text-decoration: none;
        }
        .btn-secondary-outline:hover {
            background-color: #f5f5f7;
            border-color: #86868b;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="main-container">
    <div class="mb-4">
        <h2 class="section-title m-0">Account <span class="text-muted" style="font-weight:400;">Profile</span></h2>
    </div>

    <div class="profile-card">
        <div class="profile-row">
            <span class="profile-label">회원 식별 ID</span>
            <span class="profile-value" th:text="${member.id}">id</span>
        </div>
        <div class="profile-row">
            <span class="profile-label">이름</span>
            <span class="profile-value" th:text="${member.username}">username</span>
        </div>
        <div class="profile-row">
            <span class="profile-label">이메일 계정</span>
            <span class="profile-value" th:text="${member.loginId}">user@domain.com</span>
        </div>
    </div>

    <div class="d-flex gap-2 justify-content-end">
        <button class="btn-custom btn-primary-dark" th:onclick="|location.href='@{/member/my-page/my-item}'|" type="button">내가 등록한 상품</button>
        <button class="btn-custom btn-primary-dark" th:onclick="|location.href='@{/member/my-page/my-review}'|" type="button">내가 등록한 후기</button>
        <button class="btn-custom btn-secondary-outline" th:onclick="|location.href='@{/order/list}'|" type="button">주문 내역 조회</button>
    </div>
</div>

</body>
</html>
