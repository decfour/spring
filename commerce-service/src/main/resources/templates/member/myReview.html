<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>THGTTS - My Items</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .main-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.8px;
        }

        .product-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .product-table th {
            padding: 14px 0;
            font-weight: 500;
            color: #86868b;
            font-size: 0.85rem;
            border-bottom: 1px solid #d2d2d7;
        }
        .product-table td {
            padding: 18px 0;
            border-bottom: 1px solid #e5e5e7;
            font-size: 0.95rem;
        }

        .btn-custom {
            border-radius: 6px;
            font-size: 0.85rem;
            padding: 10px 20px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .btn-secondary-outline {
            background: none;
            border: 1px solid #d2d2d7;
            color: #1d1d1f;
        }
        .btn-secondary-outline:hover {
            background-color: #f5f5f7;
            border-color: #86868b;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="main-container">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <h2 class="section-title m-0">My <span class="text-muted" style="font-weight:400;">Review</span></h2>
        <button class="btn-custom btn-secondary-outline" th:onclick="|location.href='@{/member/my-page}'|" type="button">마이페이지 홈</button>
    </div>

    <table class="product-table">
        <thead>
        <tr>
            <th style="width: 10%; text-align: center;">ID</th>
            <th style="width: 40%; text-align: center;">Product</th>
            <th style="width: 40%; text-align: center;">Title</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="review : ${myReviews}">
            <td th:text="${review.id}" style="width: 10%; color: #86868b; text-align: center;">1</td>

            <td style="width: 40%; text-align: center;">
                <a th:href="@{/shop/item/{itemId}/review/{reviewId}(itemId=${review.item.id}, reviewId=${review.id})}"
                   th:text="${review.item.name}"
                   class="text-dark fw-medium text-decoration-none"
                   style="letter-spacing: -0.2px;">상품명</a>
            </td>

            <td th:text="${review.title}" style="width: 40%; text-align: center; color: #1d1d1f;">제목</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
