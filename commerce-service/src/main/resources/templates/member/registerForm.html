<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>THGTTG - REGISTER</title>
    <style>
        /* 로그인 폼과 동일한 바둑판 정렬 규칙 적용 */
        form > div {
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 80px 250px;
            align-items: center;
            gap: 10px;
        }
        .field-error {
            grid-column: 2;
            color: #dc3545;
            font-size: 0.9em;
        }
        .global-error { color: #dc3545; font-weight: bold; }

        button { margin-left: 90px; }
    </style>
</head>
<body>

<h2>Join</h2>

<form th:action="@{/member/register}" th:object="${member}" method="post">

    <div th:if="${#fields.hasGlobalErrors()}" style="display: block;">
        <p class="global-error" th:each="err : ${#fields.globalErrors()}" th:text="${err}">전체 오류 메시지</p>
    </div>

    <div>
        <label for="username">이름</label>
        <input type="text" id="username" th:field="*{username}" placeholder="이름을 입력하세요" />
        <div class="field-error" th:errors="*{username}">이름 오류</div>
    </div>

    <div>
        <label for="email">이메일</label>
        <input type="text" id="email" th:field="*{email}" placeholder="example@email.com" />
        <div class="field-error" th:errors="*{email}">이메일 오류</div>
    </div>

    <div>
        <label for="loginId">아이디</label>
        <input type="text" id="loginId" th:field="*{loginId}" />
        <div class="field-error" th:errors="*{loginId}">아이디 오류</div>
    </div>

    <div>
        <label for="loginPassword">비밀번호</label>
        <input type="password" id="loginPassword" th:field="*{loginPassword}" />
        <div class="field-error" th:errors="*{loginPassword}">비밀번호 오류</div>
    </div>

    <hr>

    <div>
        <button type="submit">가입</button>
    </div>

</form>

</body>
</html>
