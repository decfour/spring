<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>THGTTS - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .auth-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 0 20px;
        }
        .form-label-custom {
            font-size: 0.85rem;
            font-weight: 500;
            color: #86868b;
            margin-bottom: 6px;
            display: block;
        }
        .form-input-text {
            width: 100%;
            border: 1px solid #d2d2d7;
            border-radius: 6px;
            padding: 12px;
            font-size: 0.95rem;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input-text:focus {
            border-color: #86868b;
        }
        .btn-auth-submit {
            width: 100%;
            background-color: #1d1d1f;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-auth-submit:hover {
            background-color: #323236;
        }
        .auth-link-box {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
        }
        .auth-link {
            color: #0066cc;
            text-decoration: none;
        }
        .auth-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="auth-container">
    <h2 class="fw-bold mb-4 text-center" style="font-size: 1.8rem; letter-spacing: -0.6px;">Create Account</h2>

    <form th:action th:object="${member}" method="post">

        <div th:if="${#fields.hasGlobalErrors()}" class="mb-3">
            <p class="text-danger small m-0" th:each="err : ${#fields.globalErrors()}" th:text="${err}">오류 메시지</p>
        </div>

        <div class="mb-3">
            <label for="username" class="form-label-custom">이름</label>
            <input type="text" id="username" th:field="*{username}" class="form-input-text" style="margin-bottom:0;" th:errorclass="is-invalid" placeholder="Your name">
            <div class="invalid-feedback mt-1" th:errors="*{username}">이름 오류</div>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label-custom">이메일</label>
            <input type="email" id="email" th:field="*{email}" class="form-input-text" style="margin-bottom:0;" th:errorclass="is-invalid" placeholder="Your Email">
            <div class="invalid-feedback mt-1" th:errors="*{email}">이메일 오류</div>
        </div>

        <div class="mb-3">
            <label for="loginId" class="form-label-custom">아이디</label>
            <input type="text" id="loginId" th:field="*{loginId}" class="form-input-text" style="margin-bottom:0;" th:errorclass="is-invalid" placeholder="Your ID">
            <div class="invalid-feedback mt-1" th:errors="*{loginId}">아이디 오류</div>
        </div>

        <div class="mb-4"> <label for="password" class="form-label-custom">비밀번호</label>
            <input type="password" id="password" th:field="*{loginPassword}" class="form-input-text" style="margin-bottom:0;" th:errorclass="is-invalid" placeholder="Password">
            <div class="invalid-feedback mt-1" th:errors="*{loginPassword}">비밀번호 오류</div>
        </div>

        <button class="btn-auth-submit" type="submit">가입 완료</button>
    </form>

    <div class="auth-link-box">
        <span class="text-muted">계정이 있으신가요?</span>
        <a href="/member/login" class="auth-link">로그인</a>
    </div>
</div>

</body>
</html>
