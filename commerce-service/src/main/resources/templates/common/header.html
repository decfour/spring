<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="mainHeader" style="background-color: #1d1d1f; padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center;">

    <div>
        <a href="/" style="color: white; font-weight: bold; text-decoration: none; margin-right: 20px;">The Hitchhiker's Guide to the Galaxy</a>
    </div>

    <div>
        <span th:if="${session.loginMember == null}">
            <button type="button" onclick="location.href='/member/login'">로그인</button>
            <button type="button" onclick="location.href='/member/register'">회원가입</button>
        </span>

        <span th:if="${session.loginMember != null}">
            <span th:text="${session.loginMember.username}" style="margin-right: 15px;">user</span>
            <button type="button" onclick="location.href='/cart'">장바구니</button>
            <button type="button" onclick="location.href='/logout'">로그아웃</button>
        </span>
    </div>
</div>
</html>
