<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>THGTTS - COMMUNITY DETAIL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .main-container {
            max-width: 680px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .post-meta {
            font-size: 0.85rem;
            color: #86868b;
            margin-bottom: 10px;
            font-weight: 400;
        }
        .post-title {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.3;
            margin-bottom: 16px;
        }
        .post-author-box {
            font-size: 0.95rem;
            color: #424245;
            padding-bottom: 24px;
            font-weight: 500;
        }
        .post-author-box .author-name {
            color: #1d1d1f;
            font-weight: 600;
        }
        .post-content-body {
            border-top: 1px solid #1d1d1f;
            border-bottom: 1px solid #e5e5e7;
            padding: 40px 10px;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #333336;
            white-space: pre-wrap;
            min-height: 200px;
        }
        .like-section {
            display: flex;
            justify-content: center;
            margin-top: 40px;
            margin-bottom: 20px;
        }
        .btn-like {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #ffffff;
            color: #1d1d1f;
            border: 1px solid #d2d2d7;
            padding: 10px 24px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 980px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-like:hover {
            background-color: #f5f5f7;
            border-color: #86868b;
        }
        .btn-like .like-icon {
            color: #ff3b30;
        }

        .button-group {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-apple-light {
            background-color: #f5f5f7;
            color: #1d1d1f;
            border: none;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 980px;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .btn-apple-light:hover {
            background-color: #e8e8ed;
            color: #1d1d1f;
        }
        .btn-apple-link {
            color: #0066cc;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .btn-apple-link:hover {
            text-decoration: underline;
        }
        .btn-apple-danger {
            color: #ff3b30;
            background: none;
            border: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 0;
            cursor: pointer;
        }
        .btn-apple-danger:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="main-container">

    <div class="post-header">
        <!-- 카테고리, 날짜, 조회수 -->
        <div class="post-meta">
            <span>자유게시판</span> •
            <span th:text="${#temporals.format(post.createdDate, 'yyyy년 MM월 dd일 HH:mm')}">2026년 07월 24일 15:30</span> •
            <span>조회 <th:block th:text="${post.viewCount}">0</th:block></span>
        </div>

        <!-- 메인 제목 -->
        <h1 class="post-title" th:text="${post.title}">게시글 제목</h1>

        <!-- 제목 바로 아래 작성자 정보 -->
        <div class="post-author-box">
            <span class="text-muted">작성자</span>
            <span class="author-name ms-1" th:text="${post.writer != null ? post.writer.username : '익명'}">작성자</span>
        </div>
    </div>

    <!-- 본문 영역 -->
    <div class="post-content-body" th:text="${post.content}">
        게시글 내용
    </div>

    <!-- 추천 버튼 -->
    <div class="like-section">
        <form th:action="@{/community/{id}/like(id=${post.id})}" method="post">
            <button type="submit" class="btn-like">
                <span class="like-icon">♥</span>
                <span>추천</span>
                <strong th:text="${post.likeCount}">0</strong>
            </button>
        </form>
    </div>

    <!-- 하단 버튼 (목록 / 수정 / 삭제) -->
    <div class="button-group">
        <a href="/community" class="btn-apple-light">목록 보기</a>

        <div th:if="${loginMember != null && (loginMember.id == post.writer?.id || loginMember.memberType.name() == 'ADMIN')}"
             class="d-flex gap-3 align-items-center">

            <a th:href="@{/community/{id}/edit(id=${post.id})}" class="btn-apple-link">수정</a>

            <form th:action="@{/community/{id}/delete(id=${post.id})}" method="post" style="display: inline;">
                <button type="submit" class="btn-apple-danger" onclick="return confirm('정말 삭제하시겠습니까?');">삭제</button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
