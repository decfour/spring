<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DON'T PANIC!</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .main-container {
            max-width: 680px;
            margin: 120px auto;
            padding: 0 20px;
        }
        .main-title {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1.2px;
            color: #1d1d1f;
            margin-bottom: 8px;
        }
        .main-sub {
            font-size: 1.3rem;
            color: #86868b;
            font-weight: 400;
            letter-spacing: -0.4px;
            margin-bottom: 48px;
        }
        .link-btn {
            color: #0066cc;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 400;
            margin-right: 32px;
            transition: color 0.2s;
        }
        .link-btn:hover {
            color: #0044aa;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="main-container">
    <h1 class="main-title">DON'T PANIC!</h1>
    <p class="main-sub">Welcome to the central commerce service.</p>

    <div class="d-flex">
        <a th:href="@{/info}" class="link-btn">Learn more <span style="font-size:0.9rem;">→</span></a>
        <a th:href="@{/shop}" class="link-btn">Shop now <span style="font-size:0.9rem;">→</span></a>
    </div>
</div>

</body>
</html>
