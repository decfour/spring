<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>THGTTS - Add Item</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .main-container {
            max-width: 540px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .form-label-custom {
            font-size: 0.85rem;
            font-weight: 500;
            color: #86868b;
            margin-bottom: 6px;
            display: block;
        }
        .form-input-text {
            width: 100%;
            border: 1px solid #d2d2d7;
            border-radius: 6px;
            padding: 10px;
            font-size: 0.95rem;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input-text:focus {
            border-color: #86868b;
        }
        .btn-custom-pack {
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }
        .btn-submit {
            background-color: #1d1d1f;
            color: #ffffff;
            border: none;
        }
        .btn-submit:hover {
            background-color: #323236;
        }
        .btn-cancel-outline {
            background-color: #ffffff;
            border: 1px solid #d2d2d7;
            color: #555559;
        }
        .btn-cancel-outline:hover {
            background-color: #f5f5f7;
            border-color: #86868b;
            color: #1d1d1f;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="main-container">
    <h2 class="fw-bold mb-4" style="font-size: 1.8rem; letter-spacing: -0.6px;">Add Product</h2>

    <form th:action th:object="${item}" method="post" enctype="multipart/form-data">
        <div>
            <label for="name" class="form-label-custom">상품명</label>
            <input type="text" id="name" th:field="*{name}" class="form-input-text" placeholder="Product name">
        </div>
        <div class="row">
            <div class="col">
                <label for="price" class="form-label-custom">가격</label>
                <input type="number" id="price" th:field="*{price}" class="form-input-text" placeholder="Price">
            </div>
            <div class="col">
                <label for="stock" class="form-label-custom">수량</label>
                <input type="number" id="stock" th:field="*{stock}" class="form-input-text" placeholder="Stock">
            </div>
        </div>

        <div class="mb-4">
            <label for="description" class="form-label-custom">설명</label>
            <textarea id="description" th:field="*{description}" rows="2" class="form-input-text" placeholder="Description" style="resize:none;"></textarea>
        </div>

        <div class="mb-4">
            <label class="form-label-custom">카테고리</label>
            <div class="d-flex gap-4 pt-1">
                <div th:each="type : ${itemTypes}" class="form-check">
                    <input type="radio" th:field="*{itemType}" th:value="${type.name()}" class="form-check-input" style="border-color:#d2d2d7;">
                    <label th:for="${#ids.prev('itemType')}" th:text="${type.description}" class="form-check-label text-dark" style="font-size:0.9rem;">BOOK</label>
                </div>
            </div>
        </div>

        <br>

        <div class="mb-4">
            <label for="deliveryType" class="form-label-custom">배송 방식</label>
            <select id="deliveryType" th:field="*{deliveryType}" class="form-input-text" style="background-color: #ffffff; -webkit-appearance: none; appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2386868b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22/%3E%3C/svg%3E'); background-repeat: no-repeat; background-position: right 12px top 50%; background-size: 10px auto;">
                <option value="">배송 방식을 선택하세요</option>
                <option th:each="type : ${deliveryTypes}"
                        th:value="${type.name()}"
                        th:text="${type.description}">일반배송</option>
            </select>
        </div>

        <div class="mb-4">
            <label for="imageFile" class="form-label-custom">상품 대표 이미지</label>
            <input type="file" id="imageFile" th:field="*{imageFile}" class="form-input-text" style="padding: 6px 10px;">
        </div>

        <div class="form-check mb-4 mt-2">
            <input type="checkbox" id="open" th:field="*{open}" class="form-check-input" style="border-color:#d2d2d7;">
            <label for="open" class="form-check-label" style="font-size:0.9rem; color:#424245;">판매 중</label>
        </div>

        <hr class="my-4" style="border-color:#e5e5e7;">

        <div class="d-flex gap-2 justify-content-end align-items-center">
            <button class="btn-custom-pack btn-submit" type="submit">등록</button>
            <button class="btn-custom-pack btn-cancel-outline"
                    th:onclick="|location.href='@{/shop}'|"
                    type="button">취소</button>
        </div>
    </form>
</div>

</body>
</html>
