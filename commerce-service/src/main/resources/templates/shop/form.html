<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>THGTTS - Add Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .main-container {
            max-width: 540px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .form-label-custom {
            font-size: 0.85rem;
            font-weight: 500;
            color: #86868b;
            margin-bottom: 6px;
            display: block;
        }
        .form-input-text {
            width: 100%;
            border: 1px solid #d2d2d7;
            border-radius: 6px;
            padding: 10px;
            font-size: 0.95rem;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input-text:focus {
            border-color: #86868b;
        }
        .form-input-text.field-error {
            border-color: #ff3b30;
        }
        .field-error-text {
            color: #ff3b30;
            font-size: 0.85rem;
            margin-top: -15px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .btn-custom-pack {
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }
        .btn-submit {
            background-color: #1d1d1f;
            color: #ffffff;
            border: none;
        }
        .btn-submit:hover {
            background-color: #323236;
        }
        .btn-cancel-outline {
            background-color: #ffffff;
            border: 1px solid #d2d2d7;
            color: #555559;
        }
        .btn-cancel-outline:hover {
            background-color: #f5f5f7;
            border-color: #86868b;
            color: #1d1d1f;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="main-container">

    <h2 class="fw-bold mb-4"
        style="font-size:1.8rem; letter-spacing:-0.6px;"
        th:text="${isEdit} ? 'Edit Product' : 'Add Product'">
        Add Product
    </h2>

    <form id="itemForm"
          th:action
          th:object="${item}"
          method="post"
          enctype="multipart/form-data">

        <!-- 수정 시에만 ID 표시 -->
        <div th:if="${isEdit}">
            <label for="id" class="form-label-custom">ID</label>
            <input type="text"
                   id="id"
                   th:field="*{id}"
                   readonly
                   class="form-input-text"
                   style="background:#f5f5f7;color:#86868b;border-color:#e5e5e7;">
        </div>

        <div>
            <label for="name" class="form-label-custom">상품명</label>
            <input type="text"
                   id="name"
                   th:field="*{name}"
                   class="form-input-text"
                   placeholder="Product name"
                   th:classappend="${#fields.hasErrors('name')} ? 'field-error' : ''">

            <div class="field-error-text"
                 th:errors="*{name}">
            </div>
        </div>

        <div class="row">

            <div class="col">
                <label for="price" class="form-label-custom">가격</label>

                <input type="number"
                       id="price"
                       th:field="*{price}"
                       class="form-input-text"
                       placeholder="Price"
                       th:classappend="${#fields.hasErrors('price')} ? 'field-error' : ''">

                <div class="field-error-text"
                     th:errors="*{price}">
                </div>
            </div>

            <div class="col">
                <label for="stock" class="form-label-custom">수량</label>

                <input type="number"
                       id="stock"
                       th:field="*{stock}"
                       class="form-input-text"
                       placeholder="Stock"
                       th:classappend="${#fields.hasErrors('stock')} ? 'field-error' : ''">

                <div class="field-error-text"
                     th:errors="*{stock}">
                </div>
            </div>

        </div>

        <div class="mb-4">
            <label for="description" class="form-label-custom">설명</label>

            <textarea id="description"
                      rows="2"
                      style="resize:none;"
                      class="form-input-text"
                      placeholder="Description"
                      th:field="*{description}">
            </textarea>
        </div>

        <div class="mb-4">

            <label class="form-label-custom">카테고리</label>

            <div class="d-flex gap-4 pt-1">

                <div th:each="type : ${itemTypes}"
                     class="form-check">

                    <input type="radio"
                           th:field="*{itemType}"
                           th:value="${type.name()}"
                           class="form-check-input"
                           style="border-color:#d2d2d7;">

                    <label th:for="${#ids.prev('itemType')}"
                           th:text="${type.description}"
                           class="form-check-label text-dark"
                           style="font-size:0.9rem;">
                    </label>

                </div>

            </div>

            <div class="field-error-text"
                 style="margin-top:5px;"
                 th:errors="*{itemType}">
            </div>

        </div>

        <div class="mb-4">

            <label for="deliveryType"
                   class="form-label-custom">
                배송 방식
            </label>

            <select id="deliveryType"
                    th:field="*{deliveryType}"
                    class="form-input-text"
                    th:classappend="${#fields.hasErrors('deliveryType')} ? 'field-error' : ''">

                <option value="">배송 방식을 선택하세요</option>

                <option th:each="type : ${deliveryTypes}"
                        th:value="${type.name()}"
                        th:text="${type.description}">
                </option>

            </select>

            <div class="field-error-text"
                 th:errors="*{deliveryType}">
            </div>

        </div>

        <div class="mb-4">

            <label for="imageFile"
                   class="form-label-custom"
                   th:text="${isEdit} ? '상품 이미지 변경' : '상품 대표 이미지'">
                상품 대표 이미지
            </label>

            <input type="file"
                   id="imageFile"
                   th:field="*{imageFile}"
                   class="form-input-text"
                   style="padding:6px 10px;">

        </div>

        <div class="form-check mb-4 mt-2">

            <input type="checkbox"
                   id="open"
                   th:field="*{open}"
                   class="form-check-input">

            <label for="open"
                   class="form-check-label"
                   style="font-size:.9rem;color:#424245;">
                판매 중
            </label>

        </div>

        <hr class="my-4" style="border-color:#e5e5e7;">

    </form>

    <div class="d-flex gap-2 justify-content-end align-items-center">

        <button form="itemForm"
                type="submit"
                class="btn-custom-pack btn-submit"
                th:text="${isEdit} ? '수정' : '등록'">
            등록
        </button>

        <!-- 수정 화면에서만 -->
        <th:block th:if="${isEdit}">

            <form th:if="${!item.deleted}"
                  th:action="@{/shop/item/{id}/delete(id=${item.id})}"
                  method="post"
                  style="display:inline"
                  onsubmit="return confirm('삭제하시겠습니까?');">

                <button class="btn-custom-pack btn-delete-outline"
                        type="submit">
                    삭제
                </button>

            </form>

            <form th:if="${item.deleted}"
                  th:action="@{/shop/item/{id}/restore(id=${item.id})}"
                  method="post"
                  style="display:inline"
                  onsubmit="return confirm('복원하시겠습니까?');">

                <button class="btn-custom-pack btn-restore-outline"
                        type="submit">
                    복원
                </button>

            </form>

        </th:block>

        <!-- 취소 버튼 -->
        <a th:if="${isEdit}"
           th:href="@{/shop/item/{id}(id=${item.id})}"
           class="btn-custom-pack btn-cancel-outline text-decoration-none">
            취소
        </a>

        <a th:unless="${isEdit}"
           th:href="@{/shop}"
           class="btn-custom-pack btn-cancel-outline text-decoration-none">
            취소
        </a>

    </div>

</div>

</body>
</html>
