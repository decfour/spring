<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>상품 등록</title>
</head>
<body>

<div class="container">
    <h2>상품 등록</h2>

    <!-- th:object 사용 -->
    <form th:action th:object="${item}" method="post">

        <div>
            <label for="name">상품명</label>
            <input type="text" id="name" th:field="*{name}" placeholder="이름을 입력하세요">
        </div>

        <div>
            <label for="price">가격</label>
            <input type="number" id="price" th:field="*{price}" placeholder="가격을 입력하세요">
        </div>

        <div>
            <label for="quantity">수량</label>
            <input type="number" id="quantity" th:field="*{quantity}" placeholder="수량을 입력하세요">
        </div>

        <hr>

        <!-- 추가 정보 -->
        <div>
            <div>판매 오픈 여부</div>
            <input type="checkbox" id="open" th:field="*{open}">
            <label for="open">판매 오픈</label>
        </div>

        <div>
            <label for="description">상품 설명</label>
            <textarea id="description" th:field="*{description}" rows="5"></textarea>
        </div>

        <hr>

        <div class="row">
            <button type="submit">상품 등록 완료</button>
            <button type="button" th:onclick="|location.href='@{/shop/items}'|">취소</button>
        </div>

    </form>
</div>

</body>
</html>
