<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>THGTTG - ITEM</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        /* 1. 홈 화면과 완벽한 타이틀 일치를 위해 부트스트랩 스타일 리셋 */
        body {
            padding: 8px; /* 일반적인 브라우저 기본 여백(마진) 재현 */
        }
        h1 {
            font-size: 2em; /* 브라우저 기본 h1 크기로 강제 고정 */
            margin-top: 0.67em;
            margin-bottom: 0.67em;
            font-weight: bold;
            color: #000; /* 부트스트랩 회색조 무력화 */
        }
        /* 2. 가로 메뉴 스타일 */
        ul.menu {
            list-style: none;
            padding: 0;
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .link-style-btn {
            background: none;
            border: none;
            color: -webkit-link;
            text-decoration: underline;
            cursor: pointer;
            padding: 0;
            font-size: 16px;
        }

        /* 3. 테이블만 부트스트랩 레이아웃 가두기 */
        .table-container {
            max-width: 800px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<h3>상품 상세</h3>

<hr>

<ul>
    <li>품번: <span th:text="${item.id}">1</span></li>
    <li>이름: <span th:text="${item.name}">상품명</span></li>
    <li>가격: <span th:text="${item.price}">0</span></li>
    <li>수량: <span th:text="${item.stock}">0</span></li>
    <li>종류: <span th:text="${item.itemType}">1</span></li>
    <li>설명: <p th:text="${item.description}">설명입니다.</p></li>
</ul>

<hr>

<ul>
    <li>상태:
        <span th:text="${item.open} ? '판매중' : '미오픈'"></span>
    </li>
    <li>배송: <span th:text="${item.delivery}">기본배송</span></li>
</ul>

<hr>

<!-- 판매중일 때만 주문 창이 보이도록 th:if 처리 -->
<div th:if="${item.open}">

    <div th:if="${item.stock > 0}">
        <form th:action="@{/order/one}" method="post" style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
            <input type="hidden" name="itemId" th:value="${item.id}" />
            <label for="count">주문 수량 : </label>
            <input type="number" id="count" name="count" min="1" th:max="${item.stock}" value="1" required style="width: 80px;" />
            <button type="submit" class="btn btn-primary" style="cursor: pointer; padding: 4px 12px;">주문하기</button>
        </form>

        <form th:action="@{/cart/add}" method="post">
            <input type="hidden" name="itemId" th:value="${item.id}" />
            <label for="cartCount">장바구니 수량 : </label>
            <input type="number" id="cartCount" name="count" min="1" th:max="${item.stock}" value="1" required />
            <button type="submit" class="btn btn-success" style="cursor: pointer;">장바구니 담기</button>
        </form>
    </div>

    <div th:unless="${item.stock > 0}" style="color: #dc3545; font-weight: bold; padding: 10px 0;">
        ❌ 현재 이 상품은 품절 상태입니다. (재고 없음)
    </div>
</div>

<div th:if="${!item.open}">
    <p style="color: gray;">현재 판매 중이 아닙니다.</p>
</div>

<hr>

<button type="button" th:onclick="|location.href='@{/shop/item/{itemId}/edit(itemId=${item.id})}'|">수정</button>
<button type="button" onclick="location.href='/shop'">목록</button>

</body>
</html>
