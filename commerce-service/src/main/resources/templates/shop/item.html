<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>THGTTS - Item</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .main-container {
            max-width: 680px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .detail-row {
            display: flex;
            padding: 20px 0;
            border-bottom: 1px solid #e5e5e7;
            font-size: 0.95rem;
        }
        .detail-label {
            width: 140px;
            color: #86868b;
        }
        .detail-value {
            flex: 1;
            color: #1d1d1f;
        }

        .form-label-fixed {
            font-size: 0.9rem;
            width: 110px;
            color: #424245;
        }
        .input-quantity {
            width: 70px;
            height: 36px;
            border: 1px solid #d2d2d7;
            border-radius: 6px;
            padding: 0 8px;
            font-size: 0.9rem;
            text-align: center;
            outline: none;
        }
        .input-quantity:focus {
            border-color: #86868b;
        }
        .btn-action {
            width: 120px;
            height: 36px;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .btn-solid-dark {
            background-color: #1d1d1f;
            color: #ffffff;
            border: none;
        }
        .btn-solid-dark:hover {
            background-color: #323236;
        }
        .btn-outline-dark {
            background-color: #ffffff;
            color: #1d1d1f;
            border: 1px solid #1d1d1f;
        }
        .btn-outline-dark:hover {
            background-color: #f5f5f7;
            border-color: #1d1d1f;
        }
        .img-square-wrapper {
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
            background-color: #f5f5f7;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .img-square-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="main-container">
    <div class="d-flex justify-content-between align-items-baseline mb-4">
        <h2 class="fw-bold m-0" style="font-size: 2rem; letter-spacing: -0.8px;" th:text="${item.name}">상품 상세</h2>
        <span th:text="${item.open} ? '판매 중' : '판매 중지'" style="font-size: 0.85rem; color: #86868b;">상태</span>
    </div>

    <div th:if="${item.storeFileName != null}" class="img-square-wrapper mb-4">
        <img th:src="@{/shop/images/{filename}(filename=${item.storeFileName})}" alt="상품 이미지" />
    </div>

    <br>

    <div style="border-top: 1px solid #1d1d1f; margin-bottom: 30px;">
        <div class="detail-row"><div class="detail-label">이름</div><div class="detail-value" th:text="${item.name}">상품명</div></div>
        <div class="detail-row"><div class="detail-label">가격</div><div class="detail-value fw-semibold" th:text="${#numbers.formatInteger(item.price, 0, 'COMMA')} + '원'">0</div></div>
        <div class="detail-row"><div class="detail-label">재고</div><div class="detail-value" th:text="${item.stock} + '개'">0</div></div>

        <div class="detail-row"><div class="detail-label">종류</div><div class="detail-value" th:text="${item.itemType.description}">도서</div></div>

        <div class="detail-row"><div class="detail-label">설명</div><div class="detail-value text-muted" th:text="${item.description}">설명</div></div>

        <div class="detail-row" style="border:none;"><div class="detail-label">배송</div><div class="detail-value" th:text="${item.deliveryType.description}">일반배송</div></div>
    </div>

    <div th:if="${item.open}" style="background-color: #f5f5f7; border-radius: 8px; padding: 24px; margin-bottom: 30px;">
        <div th:if="${item.stock > 0}">
            <form th:action="@{/order/one}" method="post" class="d-flex align-items-center gap-3 mb-3">
                <input type="hidden" name="itemId" th:value="${item.id}" />
                <span class="form-label-fixed">즉시 결제</span>
                <input type="number" id="count" name="count" min="1" th:max="${item.stock}" value="1" class="input-quantity" required />
                <button type="submit" class="btn-action btn-solid-dark">결제</button>
            </form>

            <form th:action="@{/cart/add}" method="post" class="d-flex align-items-center gap-3">
                <input type="hidden" name="itemId" th:value="${item.id}" />
                <span class="form-label-fixed">카트 담기</span>
                <input type="number" id="cartCount" name="count" min="1" th:max="${item.stock}" value="1" class="input-quantity" required />
                <button type="submit" class="btn-action btn-outline-dark">담기</button>
            </form>
        </div>
        <div th:unless="${item.stock > 0}" style="color: #de363a; font-size: 0.9rem; font-weight: 500;">
            재고 없음
        </div>
    </div>

    <button class="btn-action btn-outline-dark"
            th:if="${session.loginMember != null and item.createdBy == session.loginMember.id}"
            th:onclick="|location.href='@{/shop/item/{itemId}/edit(itemId=${item.id})}'|"
            type="button">수정</button>
        <button class="btn-action"
                style="background-color: #f5f5f7; color: #1d1d1f; border: none;"
                th:onclick="|location.href='@{/shop}'|"
                type="button">목록</button>
        <button class="btn-action"
                style="background-color: #f5f5f7; color: #1d1d1f; border: none;"
                th:onclick="|location.href='@{/shop/item/{itemId}/review(itemId=${item.id})}'|"
                type="button">리뷰</button>
    </div>

</div>
</body>
</html>
