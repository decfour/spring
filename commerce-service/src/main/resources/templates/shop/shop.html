<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        /* 1. 홈 화면과 완벽한 타이틀 일치를 위해 부트스트랩 스타일 리셋 */
        body {
            padding: 8px; /* 일반적인 브라우저 기본 여백(마진) 재현 */
        }
        h1 {
            font-size: 2em; /* 브라우저 기본 h1 크기로 강제 고정 */
            margin-top: 0.67em;
            margin-bottom: 0.67em;
            font-weight: bold;
            color: #000; /* 부트스트랩 회색조 무력화 */
        }
        hr {
            margin: 16px 0;
            opacity: 1; /* 부트스트랩 투명도 무력화 */
            color: initial;
        }

        /* 2. 가로 메뉴 스타일 */
        ul.menu {
            list-style: none;
            padding: 0;
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .link-style-btn {
            background: none;
            border: none;
            color: -webkit-link;
            text-decoration: underline;
            cursor: pointer;
            padding: 0;
            font-size: 16px;
        }

        /* 3. 테이블만 부트스트랩 레이아웃 가두기 */
        .table-container {
            max-width: 800px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<!-- 타이틀과 메뉴는 container 밖으로 빼서 홈 화면과 좌측 시작 라인을 완벽히 일치시킴 -->
<h1>The Hitchhiker's Guide to the Galaxy</h1>

<hr>

<h3>Product List</h3>

<ul class="menu">
    <li>
        <button class="link-style-btn" th:onclick="|location.href='@{/shop/add}'|" type="button">ADD ITEM</button>
    </li>
    <li>
        <button class="link-style-btn" th:onclick="|location.href='@{/}'|" type="button">BACK</button>
    </li>
</ul>

<!-- 테이블 영역만 깔끔하게 최대 너비를 제한 -->
<div class="table-container">
    <table class="table table-hover">
        <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>상품명</th>
            <th>가격</th>
            <th>수량</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${items}">
            <td th:text="${item.id}">1</td>
            <td>
                <a th:href="@{/shop/item/{itemId}(itemId=${item.id})}" th:text="${item.name}">테스트 상품</a>
            </td>
            <td th:text="${item.price}">10,000</td>
            <td th:text="${item.quantity}">5</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
