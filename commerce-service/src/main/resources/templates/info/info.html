<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>THGTTS - Info</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .main-container {
            max-width: 680px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.8px;
        }
        .info-menu-list {
            list-style: none;
            padding: 0;
            margin: 30px 0 0 0;
            display: flex;
            flex-direction: column;
        }
        .info-menu-item {
            border-bottom: 1px solid #e5e5e7;
        }
        .info-menu-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            color: #1d1d1f;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s, padding-left 0.2s;
        }
        .info-menu-link:hover {
            color: #0066cc;
            padding-left: 4px;
        }
        .info-link-arrow {
            color: #86868b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="main-container">
    <div class="mb-4">
        <h2 class="section-title m-0">Info <span class="text-muted" style="font-weight:400;">About Us</span></h2>
    </div>

    <div style="border-top: 1px solid #1d1d1f;">
        <ul class="info-menu-list">
            <li class="info-menu-item">
                <a href="/notice" class="info-menu-link">
                    <span>NOTICE</span>
                    <span class="info-link-arrow">→</span>
                </a>
            </li>
            <!--
            <li class="info-menu-item">
                <a href="/info/map" class="info-menu-link">
                    <span>MAP</span>
                    <span class="info-link-arrow">→</span>
                </a>
            </li>
            -->
        </ul>
    </div>
</div>

</body>
</html>
