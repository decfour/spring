<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>THGTTS - REVIEW DETAIL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .main-container {
            max-width: 680px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .notice-meta {
            font-size: 0.9rem;
            color: #86868b;
            margin-bottom: 12px;
            font-weight: 400;
        }
        .notice-title {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.3;
            margin-bottom: 30px;
        }
        .notice-content-body {
            border-top: 1px solid #1d1d1f;
            border-bottom: 1px solid #e5e5e7;
            padding: 40px 10px;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #333336;
            white-space: pre-wrap;
            min-height: 200px;
        }
        .button-group {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-apple-light {
            background-color: #f5f5f7;
            color: #1d1d1f;
            border: none;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 980px;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .btn-apple-light:hover {
            background-color: #e8e8ed;
            color: #1d1d1f;
        }
        .btn-apple-link {
            color: #0066cc;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .btn-apple-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="main-container">

    <div class="notice-header">
        <div class="notice-meta">
            <span>상품 리뷰</span> •
            <span th:text="${review?.member != null ? review.member.username : '익명'}">작성자</span> •
            <span th:text="${#temporals.format(review?.createdDate, 'yyyy년 MM월 dd일 HH:mm')}">2026년 06월 04일 09:20</span>
        </div>
        <h1 class="notice-title" th:text="${review?.title}">제목</h1>
    </div>

    <div class="notice-content-body" th:text="${review?.content}">
        본문
    </div>

    <div class="button-group">
        <!-- 목록 보기 버튼 -->
        <a th:href="@{/shop/item/{itemId}/review(itemId=${itemId})}" class="btn-apple-light">목록 보기</a>

        <!-- 내가 작성한 리뷰일 경우에만 수정 버튼 노출 -->
        <div th:if="${member != null and review?.member != null and review.member.id == member.id}">
            <a th:href="@{/shop/item/{itemId}/review/{reviewId}/edit(itemId=${itemId}, reviewId=${review.id})}"
               class="btn-apple-link">수정</a>
        </div>
    </div>

</div>

</body>
</html>
