<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title th:text="${isEdit} ? 'THGTTS - Edit Review' : 'THGTTS - Add Review'">THGTTS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .main-container {
            max-width: 540px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .form-label-custom {
            font-size: 0.85rem;
            font-weight: 500;
            color: #86868b;
            margin-bottom: 6px;
            display: block;
        }

        .form-input-text {
            width: 100%;
            border: 1px solid #d2d2d7;
            border-radius: 6px;
            padding: 10px;
            font-size: 0.95rem;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input-text:focus {
            border-color: #86868b;
        }

        .form-input-text.field-error {
            border-color: #ff3b30;
        }

        .field-error-text {
            color: #ff3b30;
            font-size: 0.85rem;
            margin-top: -15px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .btn-custom-pack {
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }

        .btn-submit {
            background-color: #1d1d1f;
            color: #ffffff;
            border: none;
        }

        .btn-submit:hover {
            background-color: #323236;
        }

        .btn-cancel-outline {
            background-color: #ffffff;
            border: 1px solid #d2d2d7;
            color: #555559;
        }

        .btn-cancel-outline:hover {
            background-color: #f5f5f7;
            border-color: #86868b;
            color: #1d1d1f;
        }
    </style>
</head>

<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="main-container">

    <h2 class="fw-bold mb-4"
        style="font-size:1.8rem; letter-spacing:-0.6px;"
        th:text="${isEdit} ? 'Edit Review' : 'Write Review'">
        Review
    </h2>

    <form th:action th:object="${reviewForm}" method="post">

        <!-- 수정일 때만 -->
        <input type="hidden"
               th:if="${isEdit}"
               th:field="*{id}">

        <div>
            <label for="title" class="form-label-custom">제목</label>

            <input type="text"
                   id="title"
                   th:field="*{title}"
                   class="form-input-text"
                   placeholder="Review title"
                   th:classappend="${#fields.hasErrors('title')} ? 'field-error' : ''">

            <div class="field-error-text"
                 th:errors="*{title}">
            </div>
        </div>

        <div>
            <label for="content" class="form-label-custom">내용</label>

            <textarea id="content"
                      rows="12"
                      style="resize:none;"
                      class="form-input-text"
                      placeholder="Write your Review here..."
                      th:field="*{content}"
                      th:classappend="${#fields.hasErrors('content')} ? 'field-error' : ''"></textarea>

            <div class="field-error-text"
                 th:errors="*{content}">
            </div>
        </div>

        <hr class="my-4" style="border-color:#e5e5e7;">

        <div class="d-flex gap-2 justify-content-end align-items-center">

            <button class="btn-custom-pack btn-submit"
                    type="submit"
                    th:text="${isEdit} ? '수정' : '등록'">
                등록
            </button>

            <button class="btn-custom-pack btn-cancel-outline"
                    type="button"
                    th:if="${isEdit}"
                    th:onclick="|location.href='@{/shop/item/{itemId}/review/{reviewId}(itemId=${itemId},reviewId=${reviewForm.id})}'|">
                취소
            </button>

            <button class="btn-custom-pack btn-cancel-outline"
                    type="button"
                    th:unless="${isEdit}"
                    th:onclick="|location.href='@{/shop/item/{itemId}/review(itemId=${itemId})}'|">
                취소
            </button>

        </div>

    </form>

</div>

</body>
</html>
