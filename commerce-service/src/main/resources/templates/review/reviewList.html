<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>THGTTS - REVIEWS</title> <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .main-container {
            max-width: 680px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.8px;
        }
        .notice-table {
            width: 100%;
            margin-top: 30px;
            border-top: 1px solid #1d1d1f;
        }
        .notice-row {
            border-bottom: 1px solid #e5e5e7;
            transition: background-color 0.2s;
        }
        .notice-row:hover {
            background-color: #f5f5f7;
        }
        .notice-link {
            display: block;
            padding: 20px 10px;
            color: #1d1d1f;
            text-decoration: none;
            font-weight: 500;
        }
        .notice-date {
            color: #86868b;
            font-size: 0.85rem;
            text-align: right;
            padding: 20px 10px;
            font-weight: 400;
        }
        .btn-apple-dark {
            background-color: #1d1d1f;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 980px;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .btn-apple-dark:hover {
            background-color: #434344;
            color: #ffffff;
        }
        .empty-notice {
            text-align: center;
            padding: 60px 0;
            color: #86868b;
            font-size: 0.95rem;
        }
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 40px;
        }
        .page-link-custom {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
            padding: 0 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #000000;
            text-decoration: none;
            background-color: #ffffff;
            border: 1px solid #d2d2d7;
            transition: all 0.2s;
        }
        .page-link-custom:hover {
            background-color: #f5f5f7;
            border-color: #86868b;
            color: #000000;
        }
        .page-link-custom.active-page {
            background-color: #1d1d1f;
            color: #ffffff;
            border-color: #1d1d1f;
        }
        .page-link-custom.disabled-page {
            color: #d2d2d7;
            border-color: #e5e5e7;
            background-color: #ffffff;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div th:replace="~{common/header :: mainHeader}"></div>

<div class="main-container">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h2 class="section-title m-0">Review <span class="text-muted" style="font-weight:400;">Feedback</span></h2>
        </div>

        <div>
            <a th:href="@{/shop/item/{itemId}/review/add(itemId=${itemId})}" class="btn-apple-dark">리뷰 작성</a>
        </div>
    </div>

    <div class="notice-table">
        <table class="w-100">
            <tbody>
            <tr class="notice-row" th:each="review : ${reviews}">
                <td>
                    <a th:href="@{/shop/item/{itemId}/review/{reviewId}(itemId=${itemId}, reviewId=${review.id})}" class="notice-link" th:text="${review.title}">
                        샘플 리뷰 제목입니다.
                    </a>
                </td>
                <td class="notice-date" th:text="${#temporals.format(review.createdDate, 'yyyy.MM.dd')}">
                    2026.06.29
                </td>
            </tr>

            <tr th:if="${reviews.isEmpty()}">
                <td colspan="2" class="empty-notice">
                    작성된 리뷰가 없습니다.
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${reviews.totalPages > 1}" class="pagination-container">

        <a th:href="@{/shop/item/{itemId}/review(itemId=${itemId}, page=${reviews.number - 1})}"
           class="page-link-custom"
           th:classappend="${reviews.first} ? 'disabled-page' : ''">이전</a>
        <th:block th:each="pageNumber : ${#numbers.sequence(0, reviews.totalPages - 1)}">
            <a th:href="@{/shop/item/{itemId}/review(itemId=${itemId}, page=${pageNumber})}"
               th:text="${pageNumber + 1}"
               class="page-link-custom"
               th:classappend="${pageNumber == reviews.number} ? 'active-page' : ''">1</a>
        </th:block>
        <a th:href="@{/shop/item/{itemId}/review(itemId=${itemId}, page=${reviews.number + 1})}"
           class="page-link-custom"
           th:classappend="${reviews.last} ? 'disabled-page' : ''">다음</a>

    </div>

</div>

</body>
</html>
