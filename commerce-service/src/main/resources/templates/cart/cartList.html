<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>THGTTG - CART</title>
    <title>내 장바구니</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

<h1>🛒 내 장바구니 목록</h1>
<hr>

<div th:if="${#lists.isEmpty(cartItems)}">
    <p>장바구니가 텅 비어있습니다. 상품을 담아보세요!</p>
</div>

<div th:if="${!#lists.isEmpty(cartItems)}">
    <table>
        <thead>
        <tr>
            <th>상품명</th>
            <th>가격</th>
            <th>담은 수량</th>
            <th>총 금액</th>
            <th>관리</th> </tr>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${cartItems}">
            <td th:text="${item.item.name}">상품이름</td>
            <td th:text="${item.item.price} + '원'">0원</td>
            <td th:text="${item.count} + '개'">0개</td>
            <td th:text="${item.item.price * item.count} + '원'">0원</td>
            <td>
                <form th:action="@{/cart/items/{id}/delete(id=${item.id})}" method="post" style="margin: 0;">
                    <button type="submit" style="color: white; background-color: #dc3545; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">
                        삭제
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<hr>
<button type="button" onclick="location.href='/shop'">쇼핑 계속하기</button>

<form th:action="@{/order/cart}" method="post" style="display: inline; margin-left: 10px;">
    <button type="submit" style="color: white; background-color: #28a745; border: none; padding: 6px 20px; border-radius: 3px; cursor: pointer; font-weight: bold;">
        🛒 장바구니 상품 모두 주문하기
    </button>
</form>

</body>
</html>
