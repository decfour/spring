<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>THGTTG - CART</title>
    <title>내 장바구니</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

<h1>🛒 내 장바구니 목록</h1>
<hr>

<div th:if="${#lists.isEmpty(cartItems)}">
    <p>장바구니가 텅 비어있습니다. 상품을 담아보세요!</p>
</div>

<div th:if="${!#lists.isEmpty(cartItems)}">
    <table>
        <thead>
        <tr>
            <th>상품명</th>
            <th>가격</th>
            <th>담은 수량</th>
            <th>총 금액</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${cartItems}">
            <td th:text="${item.item.name}">상품이름</td>
            <td th:text="${item.item.price} + '원'">0원</td>
            <td th:text="${item.count} + '개'">0개</td>
            <td th:text="${item.item.price * item.count} + '원'">0원</td>
        </tr>
        </tbody>
    </table>
</div>

<hr>
<button type="button" onclick="location.href='/shop'">쇼핑 계속하기</button>

</body>
</html>
