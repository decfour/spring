<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>THGTTG - ERROR</title>
    <link th:href="@{{/css/bootstrap.min.css}}" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .error-container {
            max-width: 500px;
            margin: 120px auto;
            text-align: center;
            padding: 0 20px;
        }
        .error-code {
            font-size: 5rem;
            font-weight: 700;
            color: #86868b;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 30px;
            color: #1d1d1f;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #1d1d1f;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .btn-home:hover {
            background-color: #323236;
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="error-code">⚠️</div>
    <div class="error-message" th:text="${errorMessage}">요청을 처리하는 중 문제가 발생했습니다.</div>
    <a href="/" class="btn-home">홈으로 돌아가기</a>
</div>

</body>
</html>
