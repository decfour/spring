# AWS DB Setting
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/commerce?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# Hibernate SQL Log
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# AWS File Upload Address
file.dir=${UPLOAD_DIR}